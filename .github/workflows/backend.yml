name: Backend CI

on:
  pull_request:
    branches: ["master"]
    paths:
      - "backend/**" # Se déclenche uniquement si des fichiers du dossier backend changent

concurrency:
  group: "backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  backend-quality-and-tests:
    name: Backend Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "./backend/package.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Check Code Format (Prettier)
        run: npm run prettier:check
        working-directory: ./backend

      - name: Run Tests
        run: npm run test
        working-directory: ./backend
